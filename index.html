<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>入口ページ</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="fake-loading" class="fake-loading" aria-label="読み込み中">
    <img src="images/loading-badge.png" alt="Anything Worker ロゴ" class="loading-badge" />
    <p class="loading-text">Now Loading...</p>
  </div>

  <div id="page-content" class="page-content" aria-hidden="true">
    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="index.html">My Profile Site</a>
        <nav>
          <ul class="nav-list">
            <li><a href="index.html">入口</a></li>
            <li><a href="profile.html">個人ページ</a></li>
            <li><a href="hobbies.html">趣味</a></li>
            <li><a href="motorcycle.html">オートバイ</a></li>
            <li><a href="online-game.html">ゲーム</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="card">
          <h1>ようこそ、自己紹介サイトへ</h1>
          <p>このサイトでは、私のプロフィールや趣味について紹介しています。気になるページからご覧ください。</p>
          <div class="grid">
            <article class="tile">
              <h2>自分個人のページ</h2>
              <p>基本情報や大切にしていることをまとめています。</p>
              <a class="button" href="profile.html">プロフィールを見る</a>
            </article>
            <article class="tile">
              <h2>趣味のページ</h2>
              <p>オートバイとオンラインゲーム、2つの趣味を紹介します。</p>
              <a class="button" href="hobbies.html">趣味を見る</a>
            </article>
          </div>
        </section>
      </div>
    </main>

    <footer>© 2026 My Profile Site</footer>
  </div>

  <script>
    window.addEventListener("load", () => {
      const fakeLoading = document.getElementById("fake-loading");
      const pageContent = document.getElementById("page-content");

      setTimeout(() => {
        fakeLoading.classList.add("is-hidden");
        pageContent.classList.add("is-visible");
        pageContent.setAttribute("aria-hidden", "false");
      }, 5000);
    });
  </script>
</body>
</html>
