<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ページタイトル</title>
  <meta name="description" content="ページ概要文">

  <!-- X / Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="便利屋わたり㈱">
  <meta name="twitter:description" content="なんでもできるかもしれない一般人のあれこれ">
  <meta name="twitter:image" content="https://watarimaycry2.github.io/selfIntroduction/images/twitterMetaImage.png">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="便利屋わたり㈱">
  <meta property="og:description" content="なんでもできるかもしれない一般人のあれこれ">
  <meta property="og:url" content="https://watarimaycry2.github.io/selfIntroduction/">
  <meta property="og:image" content="https://watarimaycry2.github.io/selfIntroduction/images/twitterMetaImage.png">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="fake-loading" class="fake-loading" aria-label="読み込み中">
    <img src="images/loading-badge.png" alt="Anything Worker ロゴ" class="loading-badge" />
    <p class="loading-text">Now Loading...</p>
  </div>

  <div id="page-content" class="page-content" aria-hidden="true">
    <header class="site-header">
      <div class="header-inner">
        <a class="logo" href="#" data-link="index.html">My Profile Site</a>
        <nav class="banner-menu" aria-label="バナーメニュー">
          <div class="menu-group">
            <button class="menu-trigger" type="button" aria-expanded="false" aria-controls="sns-menu" data-menu-toggle="sns-menu">SNS</button>
            <ul class="slide-menu" id="sns-menu" aria-label="SNSリンク">
              <li><a href="https://x.com/" target="_blank" rel="noopener noreferrer">X</a></li>
              <li><a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">YouTube</a></li>
              <li><a href="https://github.com/watarimaycry2" target="_blank" rel="noopener noreferrer">Github</a></li>
            </ul>
          </div>
          <div class="menu-group">
            <button class="menu-trigger" type="button" aria-expanded="false" aria-controls="intro-menu" data-menu-toggle="intro-menu">紹介</button>
            <ul class="slide-menu" id="intro-menu" aria-label="紹介リンク">
              <li><a href="#" data-link="profile.html">基本情報</a></li>
              <li><a href="#" data-link="maple.html">メイプル</a></li>
              <li><a href="#" data-link="programmer.html">プログラマ</a></li>
              <li><a href="#" data-link="motorcycle.html">オートバイ</a></li>
              <li><a href="#" data-link="new-things.html">新しいこと</a></li>
              <li><a href="#" data-link="generated-character.html">生成キャラのこと</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <section class="card">
          <h1>ようこそ、自己紹介サイトへ</h1>
          <p>このサイトでは、私のプロフィールや趣味について紹介しています。気になるページからご覧ください。</p>
          <div class="grid">
            <article class="tile">
              <h2>自分個人のページ</h2>
              <p>基本情報や大切にしていることをまとめています。</p>
              <a class="button" href="#" data-link="profile.html">プロフィールを見る</a>
            </article>
            <article class="tile">
              <h2>趣味のページ</h2>
              <p>オートバイとオンラインゲーム、2つの趣味を紹介します。</p>
              <a class="button" href="#" data-link="hobbies.html">趣味を見る</a>
            </article>
          </div>
        </section>
      </div>
    </main>

    <footer>© 2026 My Profile Site</footer>
  </div>

  <script src="dynamic-navigation.js"></script>
  <script>
    window.addEventListener("load", () => {
      const fakeLoading = document.getElementById("fake-loading");
      const pageContent = document.getElementById("page-content");

      setTimeout(() => {
        fakeLoading.classList.add("is-hidden");
        pageContent.classList.add("is-visible");
        pageContent.setAttribute("aria-hidden", "false");
      }, 5000);
    });
  </script>
</body>
</html>
